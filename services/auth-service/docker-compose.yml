services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: eps_user
      POSTGRES_PASSWORD: eps_password
      POSTGRES_DB: eps_auth
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eps_user -d eps_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://eps_user:eps_password@auth-db:5432/eps_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cambia_esta_clave_en_produccion}
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

volumes:
  auth-db-data: