services:
  catalogo-db:
    image: postgres:15-alpine
    container_name: catalogo-db
    environment:
      POSTGRES_USER: eps_user
      POSTGRES_PASSWORD: eps_password
      POSTGRES_DB: eps_catalogo
    ports:
      - "5435:5432"
    volumes:
      - catalogo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eps_user -d eps_catalogo"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalogo-service:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8004"
    container_name: catalogo-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://eps_user:eps_password@catalogo-db:5432/eps_catalogo
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      catalogo-db:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

volumes:
  catalogo-db-data: